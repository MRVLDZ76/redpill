<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Red Pill favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#1a0505"/>
    </linearGradient>
    <linearGradient id="pillBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4a4a"/>
      <stop offset="50%" stop-color="#cc1f1f"/>
      <stop offset="100%" stop-color="#8c1212"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(8 13) rotate(-16 24 19)">
    <rect x="4" y="9" width="40" height="20" rx="10" fill="url(#pillBody)"/>
    <line x1="24" y1="9" x2="24" y2="29" stroke="#f8aaaa" stroke-opacity="0.75" stroke-width="1.4"/>
    <ellipse cx="17" cy="15" rx="8" ry="3.2" fill="#ffd3d3" fill-opacity="0.35"/>
  </g>
  <text x="10" y="55" font-family="Space Mono, monospace" font-size="7" fill="#16ff9c" opacity="0.9">RP</text>
</svg>
