<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#020202"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="rgba(220,38,38,0.55)"/>
      <stop offset="60%" stop-color="rgba(220,38,38,0.10)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="35%" stop-color="#ef4444"/>
      <stop offset="65%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.65)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Matrix rain text columns -->
  <g font-family="Courier New, monospace" font-size="18" fill="#16ff9c" opacity="0.18">
    <text x="40" y="80">10110100</text>
    <text x="40" y="160">01001110</text>
    <text x="40" y="240">11010011</text>
    <text x="40" y="320">00101101</text>
    <text x="40" y="400">10110010</text>
    <text x="40" y="480">01110100</text>
    <text x="40" y="560">11001010</text>

    <text x="1000" y="60">01101001</text>
    <text x="1000" y="140">10010110</text>
    <text x="1000" y="220">11100011</text>
    <text x="1000" y="300">00110100</text>
    <text x="1000" y="380">10101110</text>
    <text x="1000" y="460">01001011</text>
    <text x="1000" y="540">11010001</text>
  </g>

  <!-- Red glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Pill -->
  <g transform="translate(600,260)">
    <ellipse cx="0" cy="60" rx="180" ry="22" fill="rgba(0,0,0,0.55)" filter="url(#soft)"/>
    <rect x="-180" y="-44" width="360" height="88" rx="44" ry="44" fill="url(#pill)"/>
    <rect x="-170" y="-38" width="340" height="40" rx="20" ry="20" fill="url(#gloss)" opacity="0.6"/>
    <rect x="-180" y="-44" width="360" height="88" rx="44" ry="44" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  </g>

  <!-- Title -->
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="430" font-size="76" font-weight="900" fill="#ffffff" letter-spacing="-1">Escape the</text>
    <text x="600" y="510" font-size="76" font-weight="900" fill="#ef4444" letter-spacing="-1">Software Matrix.</text>
    <text x="600" y="565" font-size="22" font-weight="400" fill="#9ca3af" letter-spacing="3">RED PILL SOFTWARE &#8226; AI &amp; AUTOMATION</text>
  </g>
</svg>
